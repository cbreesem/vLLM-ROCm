name: Build comfyui-rocm
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 深度清理，最大化可用空间
        run: |
          set -e
          df -h
          # 系统大垃圾
          sudo apt clean
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache /usr/local/lib/android /usr/share/swift
          # Docker 全清（镜像/缓存/构建缓存）
          docker system prune -a -f
          docker builder prune -a -f
          df -h

      - name: 安装 skopeo（关键：替代 docker save）
        run: |
          sudo apt update
          sudo apt install -y skopeo

      - name: 直接拉取并打包（不进Docker daemon、不爆tmp）
        run: |
          set -e
          # 拉取+打包一步到位，绕开 /var/lib/docker/tmp
          skopeo copy \
            --retry-times 3 \
            --timeout 300s \
            docker://corundex/comfyui-rocm:latest \
            docker-archive:comfyui-rocm.tar.gz
          ls -lh comfyui-rocm.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: comfyui-rocm-image
          path: comfyui-rocm.tar.gz
          retention-days: 7
