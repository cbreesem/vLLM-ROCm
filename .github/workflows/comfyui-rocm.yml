name: Build comfyui-rocm
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 深度清理闲置预装软件，释放磁盘
        run: |
          set -e
          df -h
          # 清理apt缓存
          sudo apt clean
          # 删除大型预装套件
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          # 清空docker无用缓存
          docker system prune -a -f
          df -h
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and Save Docker Image
        run: |
          set -e
          docker pull corundex/comfyui-rocm
          # 流式打包，不额外占用双倍磁盘（关键优化）
          docker save corundex/comfyui-rocm | gzip > comfyui-rocm.tar.gz
          ls -lh comfyui-rocm.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: comfyui-rocm-image
          path: comfyui-rocm.tar.gz
          retention-days: 7
