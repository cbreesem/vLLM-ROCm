name: Sync comfyui:0.18.2-amd-rdna3

on:
  workflow_dispatch:

env:
  ALI_USER: ${{ secrets.ALIYUN_USERNAME }}
  ALI_PASS: ${{ secrets.ALIYUN_PASSWORD }}

jobs:
  sync-image:
    runs-on: ubuntu-latest
    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Sync Image to Aliyun
        run: |
          # 彻底干掉所有多行拼接，把所有参数塞进同一行命令里，不给环境变量解析留任何漏洞
          skopeo copy --src-no-creds --dest-creds "$ALI_USER:$ALI_PASS" --dest-tls-verify=false docker://docker.io/sinfallas/comfyui:0.18.2-amd-rdna3 docker://crpi-legts7bsv7grb58e.cn-hangzhou.personal.cr.aliyuncs.com/jeff-proxy/sinfallas/comfyui:0.18.2-amd-rdna3
